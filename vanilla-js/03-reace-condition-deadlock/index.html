<html>
  <body>
    <button id="start">데드락 시작</button>
    <div id="log"></div>
    <script>
      function log(msg) {
        document.getElementById("log").innerHTML += msg + "<br>";
        console.log(msg);
      }

      document.getElementById("start").addEventListener("click", () => {
        // 자원A, B 각각 공유 메모리 생성
        // 0 = 사용 가능, 1 = 점유 중
        const resA = new SharedArrayBuffer(4);
        const resB = new SharedArrayBuffer(4);

        const workerA = new Worker("workerA.js");
        const workerB = new Worker("workerB.js");

        workerA.postMessage({ resA, resB });
        workerB.postMessage({ resA, resB });

        workerA.onmessage = (e) => log("Worker A: " + e.data);
        workerB.onmessage = (e) => log("Worker B: " + e.data);
      });
    </script>
  </body>
</html>
